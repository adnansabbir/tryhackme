<link rel="manifest" href="/tryhackme/manifest.json">
<link rel="apple-touch-icon" href="/tryhackme/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="THM Notes">
<meta name="theme-color" content="#1c1c1e">

<style>
  .reading-time {
    font-size: 0.85rem;
    color: #888;
    margin: -0.75rem 0 1.5rem;
    font-weight: normal;
    display: block;
  }
  .force-refresh-btn {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(60, 60, 60, 0.85);
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
    padding: 0;
  }
  .force-refresh-btn:hover {
    background: rgba(80, 80, 80, 0.95);
  }
  .force-refresh-btn:disabled {
    opacity: 0.6;
    cursor: wait;
  }
  @supports (padding: env(safe-area-inset-bottom)) {
    .force-refresh-btn {
      bottom: calc(1rem + env(safe-area-inset-bottom));
    }
  }
</style>

<script>
  // ---- Service worker registration ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/tryhackme/sw.js', {
        scope: '/tryhackme/',
        updateViaCache: 'none'
      }).catch(function (err) { console.warn('SW register failed', err); });
    });
  }

  // ---- DOM injection: reading time + force-refresh button ----
  function thmInjectChrome() {
    try {
      // Reading time
      var main = document.querySelector('main, .main-content, article');
      var h1 = (main || document).querySelector('h1');
      if (h1 && !h1.parentNode.querySelector('.reading-time')) {
        var bodyEl = main || document.body;
        var pres = bodyEl.querySelectorAll('pre');
        var codeWords = 0;
        for (var i = 0; i < pres.length; i++) {
          codeWords += (pres[i].innerText || '').split(/\s+/).filter(Boolean).length;
        }
        var totalText = (bodyEl.innerText || '').split(/\s+/).filter(Boolean).length;
        var proseWords = Math.max(0, totalText - codeWords);
        if (proseWords + codeWords >= 40) {
          var minutes = Math.max(1, Math.ceil(proseWords / 200 + codeWords / 100));
          var meta = document.createElement('div');
          meta.className = 'reading-time';
          meta.textContent = '⏱️ ' + minutes + ' min read';
          h1.insertAdjacentElement('afterend', meta);
        }
      }
    } catch (e) { console.warn('reading-time inject failed', e); }

    try {
      // Force-refresh button (always inject — never hidden)
      if (!document.querySelector('.force-refresh-btn')) {
        var btn = document.createElement('button');
        btn.className = 'force-refresh-btn';
        btn.setAttribute('aria-label', 'Force refresh');
        btn.title = 'Force refresh — clears cache and reloads';
        btn.textContent = '↻';
        btn.addEventListener('click', async function () {
          btn.disabled = true;
          btn.textContent = '…';
          try {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function (r) { return r.unregister(); }));
            }
            if (window.caches) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }
          } catch (e) { console.warn('refresh cleanup failed', e); }
          location.reload();
        });
        document.body.appendChild(btn);
      }
    } catch (e) { console.warn('refresh button inject failed', e); }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', thmInjectChrome);
  } else {
    thmInjectChrome();
  }
</script>
